name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Check out the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2 - Authenticate to AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      # Step 3 - Log in to ECR
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Step 4 - Build and push Docker image tagged with git commit SHA
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/pipelineiq:$IMAGE_TAG .
          docker push $ECR_REGISTRY/pipelineiq:$IMAGE_TAG

      # Step 5 - SSH into EC2 and restart container with new image
      - name: Deploy to EC2
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 100.53.54.16
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,IMAGE_TAG
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $ECR_REGISTRY
            docker stop pipelineiq-api || true
            docker rm pipelineiq-api || true
            docker pull $ECR_REGISTRY/pipelineiq:$IMAGE_TAG
            docker run -d -p 8000:8000 --name pipelineiq-api $ECR_REGISTRY/pipelineiq:$IMAGE_TAG